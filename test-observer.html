<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; }
    .header { height: 64px; background: red; }
    .main { height: calc(100vh - 64px); overflow: auto; background: lightblue; }
    .content { height: 200px; background: yellow; }
    .marker { height: 1px; background: black; }
    .tabs { height: 40px; background: green; }
    .long { height: 2000px; background: gray; }
    .fixed { position: fixed; top: 0; left: 0; right: 0; background: white; z-index: 100; display: none; }
  </style>
</head>
<body>
  <div class="header">Header</div>
  <div class="fixed" id="fixed">Sticky Tabs</div>
  <div class="main">
    <div class="content">Content</div>
    <div class="marker" id="marker"></div>
    <div class="tabs">Tabs</div>
    <div class="long"></div>
  </div>
  <script>
    const observer = new IntersectionObserver(([entry]) => {
      document.getElementById('fixed').style.display = entry.isIntersecting ? 'none' : 'block';
    }, { threshold: 0, rootMargin: "-64px 0px 0px 0px" });
    observer.observe(document.getElementById('marker'));
  </script>
</body>
</html>
